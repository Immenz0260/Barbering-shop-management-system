server {
    listen 80;

    location / {
        root /usr/share/nginx/html;
        index index.html;
        # This is the actual fix: if the requested file doesn't exist on
        # disk, don't 404 -- just serve index.html instead, and let React
        # Router (running in the browser) decide what to render based on
        # the URL. This is the standard fix for any single-page app.
        try_files $uri /index.html;
    }
}